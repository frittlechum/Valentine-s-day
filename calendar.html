<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Our Week Together 💖</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#ffd6e7,#ff9ecb,#ff6fa5);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.container{
  text-align:center;
  width:95%;
  max-width:750px;
}

h1{
  margin-bottom:30px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}

.day{
  padding:18px;
  border-radius:14px;
  background:#ff4d6d;
  cursor:pointer;
  transition:.2s;
  white-space:pre-line;
  font-weight:bold;
}

.day:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<div class="container">
  <h1>Our Valentine Week 💌</h1>
  <div class="grid" id="grid"></div>
</div>

<script>

const days=[
  "🌹 Rose Day",
  "💍 Propose Day",
  "🍫 Chocolate Day",
  "🧸 Teddy Day",
  "🤞 Promise Day",
  "🤗 Hug Day",
  "💋 Kiss Day",
  "❤️ Valentine’s Day"
];

const passwords={
  1:"You",
  2:"stole",
  3:"my",
  4:"heart",
  5:"now",
  6:"keep",
  7:"it",
  8:"Pyunika"
};

const grid=document.getElementById("grid");

days.forEach((name,i)=>{
  const div=document.createElement("div");
  div.className="day";
  div.innerText=name + "\n(Open)";
  div.onclick=()=>openDay(i+1);
  grid.appendChild(div);
});

function openDay(num){
  const pass=prompt("Enter today's password 💖");

  if(pass===passwords[num]){
    window.location.href="day"+num+".html";
  }else{
    alert("Wrong password 😛");
  }
}

</script>

</body>
</html>
